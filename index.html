<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carta 💜</title>
<style>
  /* Formato 9:16 */
  body {
    margin: 0;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: flex-end; /* carta vai subir de baixo */
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #2a003f, #5a0f7a, #8e44ad);
  }

  /* Carta */
  .envelope {
    width: 320px;
    max-width: 90%;
    height: 400px;
    max-height: 70%;
    position: relative;
    border-radius: 15px;
    perspective: 1000px;
    transform: translateY(100%); /* começa abaixo da tela */
    transition: transform 3s ease;
  }

  .envelope.open {
    transform: translateY(0); /* sobe para o centro */
  }

  .base {
    width: 100%;
    height: 100%;
    background: #7d3c98;
    border-radius: 15px;
    position: absolute;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  .flap {
    width: 100%;
    height: 100%;
    background: #9b59b6;
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: top;
    border-radius: 15px;
    transition: transform 2s ease;
    backface-visibility: hidden;
  }

  .envelope.open .flap {
    transform: rotateX(180deg);
  }

  /* Conteúdo carta */
  .letter {
    position: absolute;
    width: 90%;
    height: 90%;
    top: 5%;
    left: 5%;
    border-radius: 15px;
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 20px;
    text-align: center;
    transform: translateY(100%);
    opacity: 0;
    transition: transform 2s ease, opacity 2s ease;
  }

  .envelope.open .letter {
    transform: translateY(0);
    opacity: 1;
  }

  .letter h2 { color: #e0b3ff; }

  /* Partículas */
  .particle {
    position: fixed;
    pointer-events: none;
    animation: float linear infinite;
    white-space: nowrap;
    user-select: none;
  }

  @keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
  }
</style>
</head>
<body>

<div class="envelope" id="envelope">
  <div class="base"></div>
  <div class="flap"></div>
  <div class="letter">
    <h2>Pra você 💜</h2>
    <p>
      Desde que você chegou,<br>
      tudo ficou mais bonito ✨<br><br>
      Eu te amo muito ❤️<br>
      Fiz com carinho 💖
    </p>
  </div>
</div>

<!-- Música -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const envelope = document.getElementById("envelope");
const musica = document.getElementById("musica");

// Partículas
const elementos = [
  "💜","💖","💘","💞","✨","⭐","🌟","💎","🐾","😭",
  "eu te amo muito 💖","fiz com carinho 💜","volta vida 😭"
];

function criarParticula() {
  const p = document.createElement("div");
  p.classList.add("particle");
  p.innerText = elementos[Math.floor(Math.random() * elementos.length)];

  const tamanho = Math.random() * 20 + 10;
  p.style.fontSize = tamanho + "px";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (4 + Math.random() * 5) + "s";
  p.style.opacity = Math.random();

  document.body.appendChild(p);

  setTimeout(() => { p.remove(); }, 9000);
}

setInterval(criarParticula, 180);

// Animação carta + música
window.onload = () => {
  setTimeout(() => {
    envelope.classList.add("open");
    musica.play().catch(() => {});
  }, 500); // carta começa a abrir meio segundo depois
};
</script>

</body>
</html>
